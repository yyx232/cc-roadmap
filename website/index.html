<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC学习路线 - 找到属于你的AI之路</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <section id="page-home" class="page active">
            <div class="hero">
                <h1>🧭 找到属于你的 <span class="highlight">AI之路</span></h1>
                <p class="subtitle">不是让你看教程。是让你看清：</p>
                <p class="subtitle">你是谁 → 你缺什么 → 先做什么 → 怎么赚钱。</p>
                <p class="subtitle-small">回答6个问题，给你一条可执行的路。大约3分钟。</p>
                <button class="btn-primary" onclick="startQuiz()">开始</button>
            </div>
        </section>

        <!-- 问卷页 -->
        <section id="page-quiz" class="page">
            <div class="quiz-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="step-indicator" id="step-indicator">第 1 / 6 题</p>

                <div id="question-area"></div>

                <div class="nav-buttons">
                    <button class="btn-back" id="btn-back" onclick="prevQuestion()" style="display:none;">← 上一题</button>
                    <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题 →</button>
                </div>
            </div>
        </section>

        <!-- 分析中 -->
        <section id="page-loading" class="page">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在分析你的情况...</p>
                <p class="loading-sub">DeepSeek 正在为你定制路线</p>
            </div>
        </section>

        <!-- 结果页 -->
        <section id="page-result" class="page">
            <div class="result-container">
                <h2>📋 你的专属路线</h2>
                <div id="result-content"></div>
                <div class="result-actions">
                    <button class="btn-secondary" onclick="restart()">重新测试</button>
                    <button class="btn-primary" onclick="copyResult()">📋 复制路线</button>
                </div>
                <p class="disclaimer">路线由AI基于你的回答生成，已验证可执行。遇到问题可以用下方搜索框查找解决方案。</p>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索你遇到的问题...">
                    <button onclick="searchHelp()">🔍 搜索</button>
                </div>
                <div id="search-result"></div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
